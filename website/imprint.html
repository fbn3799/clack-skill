<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imprint — Clack</title>
    <link rel="icon" type="image/png" href="assets/claw.png">
    <style>
        :root { --bg: #0a0a0a; --bg-card: #141414; --text: #e8e8e8; --text-dim: #888; --accent-light: #9b6dd7; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; -webkit-font-smoothing: antialiased; }
        nav { position: fixed; top: 0; width: 100%; z-index: 100; padding: 16px 24px; background: rgba(10,10,10,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
        .nav-brand img { width: 32px; height: 32px; border-radius: 8px; }
        .nav-brand span { font-weight: 700; font-size: 18px; }
        .content { max-width: 720px; margin: 0 auto; padding: 120px 24px 80px; }
        h1 { font-size: 32px; font-weight: 700; margin-bottom: 32px; }
        h2 { font-size: 18px; font-weight: 600; margin: 28px 0 8px; color: var(--text); }
        p { color: var(--text-dim); margin-bottom: 8px; font-size: 16px; }
        .note { margin-top: 32px; padding: 16px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; font-size: 14px; color: var(--text-dim); }
        footer { padding: 40px 24px; border-top: 1px solid var(--border); text-align: center; color: var(--text-dim); font-size: 14px; }
        footer a { color: var(--text-dim); text-decoration: none; }
        footer a:hover { color: var(--text); }
        .footer-links { display: flex; gap: 24px; justify-content: center; margin-bottom: 16px; }
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-brand">
        <img src="assets/claw.png" alt="Clack">
        <span>Clack</span>
    </a>
</nav>
<div class="content">
    <h1>Imprint</h1>

    <h2>Information according to § 5 ECG (Austria)</h2>

    <p><strong>Fabian Schneider</strong></p>
    <p>Dorf 53<br>6306 Söll<br>Austria</p>

    <div class="note">
        This is a private, non-commercial project. Clack is open-source software provided free of charge.
    </div>
</div>
<footer>
    <div class="footer-links">
        <a href="/">Home</a>
        <a href="/privacy.html">Privacy Policy</a>
        <a href="/terms.html">Terms of Use</a>
    </div>
    <p>© 2026 Fabian Schneider</p>
</footer>
</body>
</html>
